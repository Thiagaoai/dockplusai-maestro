name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check maestro/ || true

      - name: Tests
        run: uv run pytest --cov=maestro --cov-report=term-missing
        env:
          APP_ENV: test
          DRY_RUN: "true"
          STORAGE_BACKEND: memory
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          TELEGRAM_BOT_TOKEN: test-token
          TELEGRAM_WEBHOOK_SECRET: test-secret
          TELEGRAM_THIAGO_CHAT_ID: "123456789"
          GHL_TOKEN_ROBERTS: test
          GHL_LOCATION_ID_ROBERTS: test
          GHL_WEBHOOK_SECRET_ROBERTS: test
          GHL_TOKEN_DOCKPLUSAI: test
          GHL_LOCATION_ID_DOCKPLUSAI: test
          GHL_WEBHOOK_SECRET_DOCKPLUSAI: test
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_KEY: test
          SUPABASE_ANON_KEY: test
          REDIS_URL: redis://localhost:6379/0
          LANGCHAIN_API_KEY: test
          PROMPT_VERSION: v1
