name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/thiagaoai/dockplusai-maestro

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv && uv sync --all-extras
      - run: uv run pytest --cov=maestro --cov-report=term-missing
        env:
          APP_ENV: test
          DRY_RUN: "true"
          STORAGE_BACKEND: memory
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          TELEGRAM_BOT_TOKEN: test-token
          TELEGRAM_WEBHOOK_SECRET: test-secret
          TELEGRAM_THIAGO_CHAT_ID: "123456789"
          GHL_TOKEN_ROBERTS: test
          GHL_LOCATION_ID_ROBERTS: test
          GHL_WEBHOOK_SECRET_ROBERTS: test
          GHL_TOKEN_DOCKPLUSAI: test
          GHL_LOCATION_ID_DOCKPLUSAI: test
          GHL_WEBHOOK_SECRET_DOCKPLUSAI: test
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_KEY: test
          SUPABASE_ANON_KEY: test
          REDIS_URL: redis://localhost:6379/0
          LANGCHAIN_API_KEY: test
          PROMPT_VERSION: v1

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/maestro

            # Pull latest code
            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/Thiagaoai/dockplusai-maestro.git .
            fi

            # Build and restart
            docker compose up -d --build --remove-orphans

            # Smoke test
            sleep 5
            curl -fsS http://localhost:8000/health && echo "Health OK"
            echo "Deploy concluido: $(date -u)"
