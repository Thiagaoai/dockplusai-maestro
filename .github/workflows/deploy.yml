name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/thiagaoai/dockplusai-maestro

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv && uv sync --all-extras
      - run: uv run pytest --cov=maestro --cov-report=term-missing
        env:
          APP_ENV: test
          DRY_RUN: "true"
          STORAGE_BACKEND: memory
          ANTHROPIC_API_KEY: test-key
          OPENAI_API_KEY: test-key
          TELEGRAM_BOT_TOKEN: test-token
          TELEGRAM_WEBHOOK_SECRET: test-secret
          TELEGRAM_THIAGO_CHAT_ID: "123456789"
          GHL_TOKEN_ROBERTS: test
          GHL_LOCATION_ID_ROBERTS: test
          GHL_WEBHOOK_SECRET_ROBERTS: test
          GHL_TOKEN_DOCKPLUSAI: test
          GHL_LOCATION_ID_DOCKPLUSAI: test
          GHL_WEBHOOK_SECRET_DOCKPLUSAI: test
          SUPABASE_URL: http://localhost
          SUPABASE_SERVICE_KEY: test
          SUPABASE_ANON_KEY: test
          REDIS_URL: redis://localhost:6379/0
          LANGCHAIN_API_KEY: test
          PROMPT_VERSION: v1

  build-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/maestro/"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE,GHCR_TOKEN
          script: |
            set -e
            cd /opt/maestro
            echo "$GHCR_TOKEN" | docker login ghcr.io -u Thiagaoai --password-stdin
            docker pull $IMAGE:latest
            docker compose up -d --remove-orphans
            docker compose exec -T app python -c "import maestro; print('OK')"
            echo "Deploy concluido: $(date -u)"
