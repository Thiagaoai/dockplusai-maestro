services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=hello@dockplus.ai"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    depends_on:
      - app

  app:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maestro.rule=Host(`maestro.dockplusai.io`)"
      - "traefik.http.routers.maestro.entrypoints=websecure"
      - "traefik.http.routers.maestro.tls.certresolver=le"
      - "traefik.http.services.maestro.loadbalancer.server.port=8000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  letsencrypt:
  redis_data:
