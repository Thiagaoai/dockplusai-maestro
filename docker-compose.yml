services:
  app:
    build: .
    env_file: .env
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      - redis
    networks:
      - maestro_net

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD:-maestro-change-me}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - maestro_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - app
    networks:
      - maestro_net

networks:
  maestro_net:
    driver: bridge

volumes:
  redis_data:
